  <line x1="75" y1="92" x2="115" y2="92" stroke="#3b0764" stroke-width="4" stroke-linecap="round"/>
  <line x1="75" y1="109" x2="110" y2="109" stroke="#3b0764" stroke-width="4" stroke-linecap="round"/>

  <!-- Share Circle -->
